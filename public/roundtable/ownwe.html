<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0f">
<title>OwnWe</title>
<style>
  :root {
    --bg: #0d0d0f; --rail: #1a1a1d; --sidebar: #161618; --list: #1b1b1e;
    --list-active: #2a2a2f; --chat-bg: #0f0f11; --ink: #ebe7e0; --ink-2: #9b948a;
    --line: rgba(255,255,255,.08); --me: #3a5a40; --me-ink: #eafff0;
    --them: #242427; --them-ink: #ebe7e0; --accent: #7eb8f7; --danger: #d97d7d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", system-ui, sans-serif;
    background: var(--bg); color: var(--ink); font-size: 15px; -webkit-font-smoothing: antialiased;
  }
  .shell { display: flex; height: 100vh; }

  /* ── Icon rail ── */
  .rail { width: 60px; background: var(--rail); border-right: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; padding: 14px 0; flex-shrink: 0; }
  .rail .me-avatar { width: 38px; height: 38px; border-radius: 9px; background: #2c2c31; display: grid; place-items: center; font-size: 20px; margin-bottom: 22px; }
  .rail-btn { width: 44px; height: 44px; border: none; background: none; color: var(--ink-2); font-size: 21px; cursor: pointer; border-radius: 10px; margin-bottom: 6px; display: grid; place-items: center; position: relative; }
  .rail-btn:hover { background: var(--list); color: var(--ink); }
  .rail-btn.active { color: var(--accent); background: var(--list-active); }
  .rail-spacer { flex: 1; }

  /* ── List column ── */
  .list-col { width: 290px; background: var(--sidebar); border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; flex-shrink: 0; }
  .list-col.hidden { display: none; }
  .list-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 12px; flex-shrink: 0; }
  .list-head h2 { font-size: 16px; margin: 0; }
  .list-head-btns { display: flex; gap: 6px; }
  .add-btn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--line); background: transparent; color: var(--ink); font-size: 17px; cursor: pointer; }
  .add-btn:hover { background: var(--list-active); }
  .scroll { flex: 1; overflow-y: auto; min-height: 0; }
  .contact { display: flex; align-items: center; gap: 12px; padding: 11px 16px; cursor: pointer; border-left: 3px solid transparent; }
  .contact:hover { background: var(--list); }
  .contact.active { background: var(--list-active); border-left-color: var(--accent); }
  .avatar { width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0; display: grid; place-items: center; font-size: 22px; background: #2c2c31; cursor: pointer; }
  .avatar.group-av { background: #2a2238; }
  .ci { flex: 1; min-width: 0; }
  .ci .name { font-size: 15px; }
  .ci .sub { font-size: 12px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .unread-dot { width: 9px; height: 9px; border-radius: 50%; background: #ee5b5b; flex-shrink: 0; }
  .rail-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; border-radius: 50%; background: #ee5b5b; }
  .empty { color: var(--ink-2); font-size: 13px; padding: 22px 16px; line-height: 1.8; }

  /* ── Main column ── */
  .main-col { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); min-width: 0; min-height: 0; }
  .view { display: none; flex-direction: column; height: 100%; min-height: 0; }
  .view.active { display: flex; }

  .chat-head { padding: 14px 22px; border-bottom: 1px solid var(--line); flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
  .chat-head .chat-av { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; font-size: 18px; background: #2c2c31; cursor: pointer; flex-shrink: 0; }
  .chat-head .chat-title { font-size: 16px; flex: 1; }
  .chat-head .status { font-size: 12px; color: var(--ink-2); }
  .messages { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .placeholder { margin: auto; color: var(--ink-2); text-align: center; line-height: 2; }
  .placeholder .big { font-size: 40px; opacity: .5; }
  .row { display: flex; gap: 10px; align-items: flex-start; max-width: 72%; }
  .row.them { align-self: flex-start; }
  .row.me { align-self: flex-end; flex-direction: row-reverse; }
  .row .av { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0; display: grid; place-items: center; font-size: 18px; background: #2c2c31; cursor: pointer; }
  .bubble { padding: 9px 13px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .row.them .bubble { background: var(--them); color: var(--them-ink); border-top-left-radius: 4px; }
  .row.me .bubble { background: var(--me); color: var(--me-ink); border-top-right-radius: 4px; }
  .sys-note { align-self: center; color: var(--ink-2); font-size: 12px; background: rgba(255,255,255,.04); padding: 4px 12px; border-radius: 10px; }
  .typing { color: var(--ink-2); font-style: italic; }
  .composer { border-top: 1px solid var(--line); padding: 14px 18px; flex-shrink: 0; }
  .composer textarea { width: 100%; resize: none; min-height: 46px; max-height: 140px; background: var(--list); border: 1px solid var(--line); border-radius: 12px; color: var(--ink); padding: 12px 14px; font-family: inherit; font-size: 15px; line-height: 1.5; }
  .composer-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .attach-btn { background: var(--list); border: 1px solid var(--line); color: var(--ink); border-radius: 9px; width: 38px; height: 34px; cursor: pointer; font-size: 16px; }
  .attach-btn:hover { background: var(--list-active); }
  .attach-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .attach-preview .thumb { position: relative; width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); }
  .attach-preview .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .attach-preview .thumb button { position: absolute; top: 0; right: 0; background: rgba(0,0,0,.6); color: #fff; border: none; width: 18px; height: 18px; cursor: pointer; font-size: 12px; line-height: 1; }
  .send-btn { padding: 7px 22px; border-radius: 9px; border: none; background: var(--me); color: var(--me-ink); cursor: pointer; font-size: 14px; }
  .send-btn:disabled { opacity: .4; }

  /* ── Moments ── */
  .panel-head { padding: 16px 24px; border-bottom: 1px solid var(--line); font-size: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
  .panel-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; min-height: 0; }
  .compose { background: var(--sidebar); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 22px; }
  .compose textarea { width: 100%; resize: vertical; min-height: 60px; background: var(--list); border: 1px solid var(--line); border-radius: 10px; color: var(--ink); padding: 11px; font-family: inherit; font-size: 14px; }
  .compose-row { display: flex; justify-content: flex-end; margin-top: 8px; }
  .moment { display: flex; gap: 12px; padding: 16px 0; border-bottom: 1px solid var(--line); }
  .moment .body { flex: 1; min-width: 0; }
  .moment .name { color: var(--accent); font-size: 14px; }
  .moment .text { margin: 5px 0 8px; line-height: 1.6; white-space: pre-wrap; }
  .moment .meta { font-size: 12px; color: var(--ink-2); display: flex; gap: 16px; align-items: center; }
  .moment .meta button { background: none; border: none; color: var(--ink-2); cursor: pointer; font-size: 12px; padding: 0; }
  .moment .meta button:hover { color: var(--accent); }
  .moment .meta .more-btn { position: relative; }
  .more-menu { position: absolute; bottom: 22px; right: 0; background: var(--sidebar); border: 1px solid var(--line); border-radius: 10px; min-width: 130px; z-index: 50; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
  .more-menu button { display: block; width: 100%; text-align: left; padding: 10px 14px; background: none; border: none; color: var(--ink); cursor: pointer; font-size: 13px; }
  .more-menu button:hover { background: var(--list-active); }
  .likes { font-size: 12px; color: var(--ink-2); background: var(--list); border-radius: 8px; padding: 6px 10px; margin-top: 8px; }
  .comments { margin-top: 8px; background: var(--list); border-radius: 8px; padding: 6px 10px; }
  .comment { font-size: 13px; padding: 3px 0; display: flex; justify-content: space-between; align-items: baseline; }
  .comment-body { flex: 1; }
  .comment .who { color: var(--accent); }
  .comment .reply-who { color: var(--ink-2); }
  .comment-reply-btn { background: none; border: none; color: var(--ink-2); font-size: 11px; cursor: pointer; padding: 0 0 0 6px; flex-shrink: 0; }
  .comment-reply-btn:hover { color: var(--accent); }
  .comment-add { display: flex; gap: 8px; margin-top: 8px; }
  .comment-add input { flex: 1; background: var(--list); border: 1px solid var(--line); border-radius: 8px; color: var(--ink); padding: 6px 10px; font-size: 13px; font-family: inherit; }

  /* ── Settings ── */
  .settings-body { padding: 24px; overflow-y: auto; max-width: 560px; }
  .settings-body h3 { margin: 0 0 4px; }
  .settings-body .hint { color: var(--ink-2); font-size: 13px; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field span { display: block; font-size: 12px; color: var(--ink-2); margin-bottom: 5px; }
  .field input { width: 100%; padding: 9px 11px; border-radius: 9px; box-sizing: border-box; background: var(--list); border: 1px solid var(--line); color: var(--ink); font-family: inherit; font-size: 14px; }
  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; }

  /* ── Dialogs / buttons ── */
  dialog { background: var(--sidebar); color: var(--ink); border: 1px solid var(--line); border-radius: 16px; padding: 0; width: min(560px, 94vw); }
  dialog::backdrop { background: rgba(0,0,0,.6); }
  .modal-body { padding: 22px; display: flex; flex-direction: column; gap: 14px; max-height: 86vh; overflow-y: auto; }
  .modal-body h3 { margin: 0; }
  .modal-body label span { display: block; font-size: 12px; color: var(--ink-2); margin-bottom: 5px; }
  .modal-body input, .modal-body textarea, .modal-body select { width: 100%; padding: 9px 11px; border-radius: 9px; box-sizing: border-box; background: var(--list); border: 1px solid var(--line); color: var(--ink); font-family: inherit; font-size: 14px; }
  .modal-body textarea { resize: vertical; min-height: 150px; line-height: 1.55; }
  .modal-row { display: flex; gap: 10px; }
  .modal-foot { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .btn { padding: 8px 16px; border-radius: 9px; border: 1px solid var(--line); background: transparent; color: var(--ink); cursor: pointer; font-size: 14px; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #08121f; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .grow { flex: 1; }

  /* ── Profile panel dialog ── */
  #profileDialog { width: min(380px, 94vw); }
  .profile-hero { background: linear-gradient(135deg, #1a2a3a 0%, #1e1e24 100%); border-radius: 10px 10px 0 0; padding: 24px 22px 20px; display: flex; gap: 14px; align-items: center; }
  .profile-hero .big-av { width: 62px; height: 62px; border-radius: 14px; background: #2c2c31; display: grid; place-items: center; font-size: 32px; flex-shrink: 0; }
  .profile-hero .info h2 { margin: 0 0 4px; font-size: 18px; }
  .profile-hero .info .sub { font-size: 12px; color: var(--ink-2); }
  .profile-section { padding: 14px 22px; border-bottom: 1px solid var(--line); }
  .profile-section h4 { margin: 0 0 10px; font-size: 12px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .06em; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: var(--list); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--ink-2); }
  .tag.certain { color: var(--accent); }
  .profile-kv { display: flex; flex-direction: column; gap: 6px; }
  .profile-kv .kv { font-size: 13px; }
  .profile-kv .kv .k { color: var(--ink-2); margin-right: 6px; }
  .profile-actions { padding: 14px 22px; display: flex; gap: 10px; }

  /* ── Group chat picker ── */
  .char-check-list { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
  .char-check-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 9px; cursor: pointer; }
  .char-check-item:hover { background: var(--list-active); }
  .char-check-item input[type=checkbox] { width: auto; }

  /* Multi-bubble fade-in */
  @keyframes bubblePop {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bubble-new { animation: bubblePop 0.18s ease-out; }

  @media (max-width: 720px) {
    .list-col { width: 100%; }
    .shell.in-chat .list-col { display: none; }
    .shell:not(.in-chat) .main-col { display: none; }
  }
</style>
</head>
<body>
<div class="shell" id="shell">
  <!-- Icon rail -->
  <nav class="rail">
    <div class="me-avatar">🙂</div>
    <button class="rail-btn active" data-tab="chats" title="聊天">💬</button>
    <button class="rail-btn" data-tab="contacts" title="通讯录">👥</button>
    <button class="rail-btn" data-tab="moments" title="朋友圈">🌐</button>
    <div class="rail-spacer"></div>
    <button class="rail-btn" data-tab="settings" title="设置">⚙️</button>
  </nav>

  <!-- List column -->
  <aside class="list-col" id="listCol">
    <div class="list-head">
      <h2 id="listTitle">聊天</h2>
      <div class="list-head-btns">
        <button class="add-btn" id="addGroupBtn" title="新建群聊">👥</button>
        <button class="add-btn" id="addCharBtn" title="新建角色">＋</button>
      </div>
    </div>
    <div class="scroll" id="contacts"><div class="empty">还没有角色。<br>点右上角 ＋ 新建一个。</div></div>
  </aside>

  <!-- Main column -->
  <section class="main-col">
    <!-- Chat view -->
    <div class="view active" id="view-chat">
      <div class="chat-head">
        <div class="chat-av" id="chatAv" style="display:none">🙂</div>
        <span class="chat-title" id="chatTitle">选择一个角色开始聊天</span>
        <span class="status" id="chatStatus"></span>
      </div>
      <div class="messages" id="messages"><div class="placeholder"><div class="big">☾</div>左边选一个角色，<br>或新建一个。</div></div>
      <div class="composer" id="composer" style="display:none">
        <div id="attachPreview" class="attach-preview"></div>
        <textarea id="input" placeholder="说点什么…（Enter 发送，Shift+Enter 换行）"></textarea>
        <div class="composer-row">
          <button class="attach-btn" id="attachBtn" title="发图片">📎</button>
          <input type="file" id="fileInput" accept="image/*" multiple hidden>
          <span class="grow"></span>
          <button class="send-btn" id="sendBtn">发送</button>
        </div>
      </div>
    </div>

    <!-- Moments view -->
    <div class="view" id="view-moments">
      <div class="panel-head">
        <span>朋友圈</span>
        <button class="btn" id="charPostBtn" title="触发角色发圈" style="font-size:12px;padding:5px 12px">角色发圈</button>
      </div>
      <div class="panel-scroll">
        <div class="compose">
          <textarea id="momentInput" placeholder="分享点什么…"></textarea>
          <div class="compose-row"><button class="btn primary" id="momentPost">发布</button></div>
        </div>
        <div id="momentsList"></div>
      </div>
    </div>

    <!-- Settings view -->
    <div class="view" id="view-settings">
      <div class="panel-head"><span>设置</span></div>
      <div class="settings-body">
        <h3>用户百科</h3>
        <div class="hint">客观信息，所有角色共享。每个角色还会基于相处形成自己的理解。</div>
        <div class="field-row">
          <div class="field"><span>年龄</span><input id="pAge"></div>
          <div class="field"><span>性别</span><input id="pGender"></div>
          <div class="field"><span>MBTI</span><input id="pMbti"></div>
        </div>
        <div class="field-row">
          <div class="field"><span>城市</span><input id="pCity"></div>
          <div class="field"><span>专业</span><input id="pMajor"></div>
          <div class="field"><span>年级/阶段</span><input id="pGrade"></div>
        </div>
        <div class="field"><span>行业（逗号分隔）</span><input id="pIndustries"></div>
        <button class="btn primary" id="pSave">保存</button>
        <span id="pSaved" style="color:#5bbca6;margin-left:10px;display:none">已保存 ✓</span>
      </div>
    </div>
  </section>
</div>

<!-- Character editor -->
<dialog id="charDialog">
  <form class="modal-body" id="charForm" method="dialog">
    <h3 id="charDialogTitle">新建角色</h3>
    <input type="hidden" id="cId">
    <div class="modal-row">
      <label style="flex:0 0 70px"><span>头像</span><input id="cEmoji" maxlength="2" placeholder="🙂" style="text-align:center"></label>
      <label class="grow"><span>名字</span><input id="cName" placeholder="如：尤金" required></label>
    </div>
    <label><span>人格 Prompt（粘贴你写的角色设定，越详细越好）</span>
      <textarea id="cPersona" placeholder="你叫…，说话风格…，你和我的关系…"></textarea></label>
    <div class="modal-row">
      <label class="grow"><span>模型来源</span>
        <select id="cProvider">
          <option value="deepseek">DeepSeek</option>
          <option value="gemini">Gemini</option>
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI</option>
          <option value="kimi">Kimi</option>
        </select></label>
      <label class="grow"><span>模型（留空用默认）</span><input id="cModel" placeholder="deepseek-chat"></label>
    </div>
    <label><span>专属 API Key（留空则用服务器上对应 provider 的 key）</span><input id="cKey" type="password" placeholder="留空即可"></label>
    <label style="display:flex;align-items:center;gap:8px;flex-direction:row">
      <input type="checkbox" id="cDeep" checked style="width:auto">
      <span style="margin:0">默认开深度思考（回复更真实；关掉可省钱）</span>
    </label>
    <div class="modal-foot">
      <button type="button" class="btn danger" id="cDelete" style="visibility:hidden">删除</button>
      <div style="display:flex;gap:10px">
        <button type="button" class="btn" id="cCancel">取消</button>
        <button type="submit" class="btn primary">保存</button>
      </div>
    </div>
  </form>
</dialog>

<!-- Group creator -->
<dialog id="groupDialog">
  <div class="modal-body">
    <h3>新建群聊</h3>
    <label><span>群名</span><input id="gName" placeholder="我们的群"></label>
    <label><span>群头像 emoji</span><input id="gEmoji" maxlength="2" placeholder="👥" style="width:80px;text-align:center"></label>
    <div>
      <div style="font-size:12px;color:var(--ink-2);margin-bottom:8px">选择角色（至少 2 个）</div>
      <div class="char-check-list" id="groupCharList"></div>
    </div>
    <div class="modal-foot">
      <span class="grow"></span>
      <button class="btn" id="gCancel">取消</button>
      <button class="btn primary" id="gCreate">创建</button>
    </div>
  </div>
</dialog>

<!-- Profile panel -->
<dialog id="profileDialog">
  <div style="max-height:86vh;overflow-y:auto">
    <div class="profile-hero">
      <div class="big-av" id="pAv">🙂</div>
      <div class="info">
        <h2 id="pName"></h2>
        <div class="sub" id="pProvider"></div>
        <div class="sub" id="pCreated" style="margin-top:3px"></div>
      </div>
    </div>
    <div class="profile-section" id="pPersonaSection">
      <h4>人格摘要</h4>
      <div id="pPersona" style="font-size:13px;color:var(--ink-2);line-height:1.6"></div>
    </div>
    <div class="profile-section" id="pTagsSection">
      <h4>她/他眼中的我 — 标签</h4>
      <div class="tag-cloud" id="pTags"></div>
    </div>
    <div class="profile-section" id="pViewsSection">
      <h4>她/他记得我说过</h4>
      <div class="profile-kv" id="pViews"></div>
    </div>
    <div class="profile-section" id="pKwSection">
      <h4>关键词</h4>
      <div class="tag-cloud" id="pKws"></div>
    </div>
    <div class="profile-actions">
      <button class="btn grow" id="pEditChar">编辑角色设定</button>
      <button class="btn" id="pClose">关闭</button>
    </div>
  </div>
</dialog>

<script>
const $ = (id) => document.getElementById(id);
const api = (path, body) => fetch(path, body
  ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
  : undefined).then((r) => r.json());
const esc = (s) => String(s || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const provLabel = (p) => ({ anthropic: "Claude", deepseek: "DeepSeek", openai: "OpenAI", gemini: "Gemini", kimi: "Kimi" }[p] || "");

let characters = [];
let groups = [];
let activeCharId = null;
let activeGroupId = null;
let pollTimer = null;
let lastKey = "";
let currentTab = "chats";
let unread = {};
let typing = false;
let blockedCharIds = new Set();
const typedIds = new Set();
// Track last seen bubble count per message id for multi-bubble delivery
const shownBubbles = {};

// ── Tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll(".rail-btn").forEach((b) => b.addEventListener("click", () => switchTab(b.dataset.tab)));
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".rail-btn").forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
  const showList = (tab === "chats" || tab === "contacts");
  $("listCol").classList.toggle("hidden", !showList);
  $("listTitle").textContent = tab === "contacts" ? "通讯录" : "聊天";
  $("view-chat").classList.toggle("active", tab === "chats" || tab === "contacts");
  $("view-moments").classList.toggle("active", tab === "moments");
  $("view-settings").classList.toggle("active", tab === "settings");
  if (tab === "moments") loadMoments();
  if (tab === "settings") loadUserBase();
}

// ── Contacts ──────────────────────────────────────────────────────────────
async function loadContacts() {
  [characters, groups] = await Promise.all([
    api("/api/ownwe/characters"),
    api("/api/ownwe/groups").catch(() => []),
  ]);
  const box = $("contacts");
  if (!characters.length && !groups.length) {
    box.innerHTML = '<div class="empty">还没有角色。<br>点右上角 ＋ 新建一个，<br>或 👥 新建群聊。</div>';
    return;
  }
  const all = [
    ...groups.map((g) => renderContactRow({ id: g.id, name: g.name, emoji: g.avatarEmoji || g.avatar_emoji || "👥", sub: `群聊 · ${(g.charIds || g.char_ids_parsed || []).length} 人`, isGroup: true })),
    ...characters.map((c) => renderContactRow({ id: c.id, name: c.name, emoji: c.avatar_emoji || "🙂", sub: provLabel(c.provider), isGroup: false })),
  ];
  box.innerHTML = all.join("");
  box.querySelectorAll(".contact").forEach((el) => {
    el.addEventListener("click", () => {
      if (el.dataset.group === "1") openGroupChat(el.dataset.id);
      else openChat(el.dataset.id);
    });
    el.addEventListener("dblclick", () => {
      if (el.dataset.group !== "1") editChar(el.dataset.id);
    });
  });
}

function renderContactRow({ id, name, emoji, sub, isGroup }) {
  const isActive = isGroup ? id === activeGroupId : id === activeCharId;
  const hasUnread = !isGroup && unread[id];
  return `<div class="contact ${isActive ? "active" : ""}" data-id="${id}" data-group="${isGroup ? 1 : 0}">
    <div class="avatar${isGroup ? " group-av" : ""}">${emoji}</div>
    <div class="ci"><div class="name">${esc(name)}</div><div class="sub">${esc(sub)}</div></div>
    ${hasUnread ? '<div class="unread-dot"></div>' : ""}
  </div>`;
}

// ── Chat ──────────────────────────────────────────────────────────────────
async function openChat(charId) {
  activeCharId = charId;
  activeGroupId = null;
  const c = characters.find((x) => x.id === charId);
  if (currentTab === "contacts") switchTab("chats");
  document.querySelectorAll(".contact").forEach((el) => el.classList.toggle("active", el.dataset.id === charId && el.dataset.group !== "1"));
  $("shell").classList.add("in-chat");
  $("chatTitle").textContent = c ? `${c.avatar_emoji || ""} ${c.name}` : "";
  $("chatAv").textContent = c ? (c.avatar_emoji || "🙂") : "🙂";
  $("chatAv").style.display = "";
  $("chatAv").dataset.charId = charId;
  $("composer").style.display = "";
  $("messages").innerHTML = '<div class="placeholder">正在进入…</div>';
  lastKey = "";
  const snap = await api("/api/ownwe/open-character", { characterId: charId });
  renderMessages(snap, true);
  startPolling();
  $("input").focus();
  delete unread[charId];
  setTimeout(refreshUnread, 1500);
}

async function openGroupChat(groupId) {
  activeGroupId = groupId;
  activeCharId = null;
  const g = groups.find((x) => x.id === groupId);
  if (currentTab === "contacts") switchTab("chats");
  document.querySelectorAll(".contact").forEach((el) => el.classList.toggle("active", el.dataset.id === groupId && el.dataset.group === "1"));
  $("shell").classList.add("in-chat");
  $("chatTitle").textContent = g ? `${g.avatarEmoji || g.avatar_emoji || "👥"} ${g.name}` : "群聊";
  $("chatAv").textContent = g ? (g.avatarEmoji || g.avatar_emoji || "👥") : "👥";
  $("chatAv").style.display = "";
  $("chatAv").dataset.charId = "";
  $("composer").style.display = "";
  $("messages").innerHTML = '<div class="placeholder">正在进入…</div>';
  lastKey = "";
  const snap = await api("/api/ownwe/open-group", { groupId });
  renderMessages(snap, true);
  startPolling();
  $("input").focus();
}

// ── Multi-bubble rendering ────────────────────────────────────────────────
// Split a long reply into natural paragraphs (double newline), each shown
// as a separate bubble. Short consecutive messages feel like real chat.
function splitBubbles(text) {
  if (!text) return [""];
  const parts = text.split(/\n{2,}/).map((s) => s.trim()).filter(Boolean);
  // Only split if we have multiple meaningful parts
  if (parts.length <= 1) return [text];
  // Don't split if any individual part is very long (single paragraph essay)
  if (parts.some((p) => p.length > 300)) return [text];
  return parts;
}

function renderMessages(snap, force) {
  if (typing && !force) return;
  const msgs = (snap.messages || []).filter((m) => ["user", "claude", "system"].includes(m.speaker));
  const running = snap.running || msgs.some((m) => m.speaker === "claude" && m.pending);
  const key = msgs.map((m) => m.id + ":" + (m.text || "").length + ":" + (m.pending ? 1 : 0)).join("|") + ":" + running;
  if (!force && key === lastKey) return;
  lastKey = key;

  const charId = activeCharId;
  const c = characters.find((x) => x.id === charId);
  const av = c ? (c.avatar_emoji || "🙂") : "🙂";
  const box = $("messages");
  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 80;

  if (force) msgs.forEach((m) => {
    if (m.speaker === "claude" && m.text) {
      typedIds.add(m.id);
      shownBubbles[m.id] = splitBubbles(m.text).length;
    }
  });

  const last = msgs[msgs.length - 1];
  const animate = !force && last && last.speaker === "claude" && last.text && !last.pending && !typedIds.has(last.id);
  // Detect new bubble(s) added to an already-typed message (shouldn't happen but safety)
  const newBubble = !force && last && last.speaker === "claude" && last.text && typedIds.has(last.id)
    && (shownBubbles[last.id] || 0) < splitBubbles(last.text).length;

  let html = "";
  for (const m of msgs) {
    if (m.speaker === "system") {
      if (m.transcript === false || /injected|context|summary/i.test(m.text || "")) continue;
      html += `<div class="sys-note">${esc(m.text)}</div>`;
    } else if (m.speaker === "user") {
      html += `<div class="row me"><div class="av">我</div><div class="bubble">${buildUserBubbleContent(m)}</div></div>`;
    } else {
      const isAnim = animate && m === last;
      if (isAnim || (m.pending && !m.text)) {
        const txt = isAnim ? "" : '<span class="typing">正在输入…</span>';
        html += `<div class="row them"><div class="av" data-char="${charId || ""}" onclick="openProfilePanel('${charId || ""}')">${av}</div><div class="bubble"${isAnim ? ' data-anim="1"' : ""}>${txt}</div></div>`;
      } else if (m.text) {
        const bubbles = splitBubbles(m.text);
        html += bubbles.map((b, i) =>
          `<div class="row them"><div class="av" data-char="${charId || ""}" onclick="openProfilePanel('${charId || ""}')">${av}</div><div class="bubble">${esc(b)}</div></div>`
        ).join("");
      }
    }
  }
  if (running && !msgs.some((m) => m.speaker === "claude" && m.pending && !m.text)) {
    html += `<div class="row them"><div class="av">${av}</div><div class="bubble"><span class="typing">正在输入…</span></div></div>`;
  }
  box.innerHTML = html || '<div class="placeholder">打个招呼吧 👋</div>';
  $("chatStatus").textContent = running ? "对方正在输入…" : "";
  if (atBottom || force) box.scrollTop = box.scrollHeight;

  if (animate) {
    typedIds.add(last.id);
    shownBubbles[last.id] = splitBubbles(last.text).length;
    // Animate the first bubble; remaining bubbles appear one by one with delay
    const bubbles = splitBubbles(last.text);
    const allBubbleEls = box.querySelectorAll(".row.them .bubble");
    // Last N bubbles are the new ones
    const newEls = Array.from(allBubbleEls).slice(-bubbles.length);
    if (newEls.length > 0) {
      // Hide all but first, typewrite first, then reveal rest sequentially
      for (let i = 1; i < newEls.length; i++) newEls[i].parentElement.style.opacity = "0";
      typewriter(newEls[0], bubbles[0], () => {
        revealNextBubble(newEls, bubbles, 1);
      });
    }
  }
}

function revealNextBubble(els, texts, idx) {
  if (idx >= els.length) return;
  const el = els[idx];
  el.parentElement.style.opacity = "";
  el.parentElement.classList.add("bubble-new");
  // Show typing indicator briefly then reveal text
  el.innerHTML = '<span class="typing">正在输入…</span>';
  const delay = 400 + Math.random() * 400;
  setTimeout(() => {
    typewriter(el, texts[idx], () => revealNextBubble(els, texts, idx + 1));
  }, delay);
}

function buildUserBubbleContent(m) {
  let html = "";
  if (Array.isArray(m.attachments)) {
    for (const att of m.attachments) {
      if (att.url) html += `<img src="${esc(att.url)}" style="max-width:160px;border-radius:8px;display:block;margin-bottom:4px">`;
    }
  }
  html += esc(m.text || "");
  return html;
}

function typewriter(el, full, onDone) {
  typing = true;
  const box = $("messages");
  const step = Math.max(1, Math.ceil(full.length / 200));
  let i = 0;
  const tick = setInterval(() => {
    i += step;
    el.textContent = full.slice(0, i);
    if (box.scrollHeight - box.scrollTop - box.clientHeight < 120) box.scrollTop = box.scrollHeight;
    if (i >= full.length) {
      clearInterval(tick);
      el.textContent = full;
      typing = false;
      box.scrollTop = box.scrollHeight;
      if (onDone) onDone();
    }
  }, 45);
}

function startPolling() {
  stopPolling();
  pollTimer = setInterval(async () => {
    if (currentTab !== "chats") return;
    try { renderMessages(await fetch("/api/state").then((r) => r.json()), false); } catch (e) {}
  }, 1300);
}
function stopPolling() { if (pollTimer) clearInterval(pollTimer); pollTimer = null; }

let pendingImages = [];
function renderAttachPreview() {
  const box = $("attachPreview");
  box.innerHTML = pendingImages.map((url, i) =>
    `<div class="thumb"><img src="${url}"><button data-rm="${i}">×</button></div>`).join("");
  box.querySelectorAll("[data-rm]").forEach((b) => b.addEventListener("click", () => {
    pendingImages.splice(Number(b.dataset.rm), 1); renderAttachPreview();
  }));
}
$("attachBtn").addEventListener("click", () => $("fileInput").click());
$("fileInput").addEventListener("change", (e) => {
  const files = Array.from(e.target.files || []).slice(0, 4);
  for (const f of files) {
    const reader = new FileReader();
    reader.onload = () => { if (pendingImages.length < 4) { pendingImages.push(reader.result); renderAttachPreview(); } };
    reader.readAsDataURL(f);
  }
  e.target.value = "";
});

async function send() {
  const input = $("input");
  const text = input.value.trim();
  const imgs = pendingImages.slice();
  if ((!text && !imgs.length) || (!activeCharId && !activeGroupId)) return;
  input.value = "";
  pendingImages = []; renderAttachPreview();
  const box = $("messages");
  const thumbs = imgs.map((u) => `<img src="${u}" style="max-width:160px;border-radius:8px;display:block;margin-bottom:4px">`).join("");
  box.insertAdjacentHTML("beforeend", `<div class="row me"><div class="av">我</div><div class="bubble">${thumbs}${esc(text)}</div></div>`);
  box.scrollTop = box.scrollHeight;
  lastKey = "";
  try {
    await fetch("/api/user", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text || "（看图）", target: "claude", images: imgs }) });
  } catch (e) { alert("发送失败：" + e.message); }
}
$("sendBtn").addEventListener("click", send);
$("input").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });

});
$("pClose").addEventListener("click", () => $("profileDialog").close());

let _profileCharId = null;
async function openProfilePanel(charId) {
  if (!charId) return;
  _profileCharId = charId;
  const c = characters.find((x) => x.id === charId);
  if (!c) return;
  $("pAv").textContent = c.avatar_emoji || "🙂";
  $("pName").textContent = c.name;
  $("pProvider").textContent = provLabel(c.provider) || "";
  $("pCreated").textContent = c.created_at ? `添加于 ${fmtTime(c.created_at)}` : "";

  const persona = (c.persona_prompt || "").slice(0, 120);
  $("pPersona").textContent = persona ? (persona + (c.persona_prompt.length > 120 ? "…" : "")) : "（未设置人格）";

  // Load the character's picture of the user
  try {
    const prof = await api(`/api/ownwe/profile?charId=${encodeURIComponent(charId)}`);
    const tags = prof.tags || [];
    $("pTags").innerHTML = tags.length
      ? tags.map((t) => `<span class="tag ${t.certain ? "certain" : ""}">${esc(t.text)}</span>`).join("")
      : '<span style="color:var(--ink-2);font-size:13px">聊得更多才会形成印象</span>';

    const views = (prof.core_views || []).concat(prof.recent_views || []).slice(0, 5);
    $("pViews").innerHTML = views.length
      ? views.map((v) => `<div class="kv"><span class="k">•</span>${esc(v.text)}</div>`).join("")
      : '<div style="color:var(--ink-2);font-size:13px">还没有记录</div>';

    const kws = prof.keywords || [];
    $("pKws").innerHTML = kws.length
      ? kws.slice(0, 10).map((k) => `<span class="tag">${esc(k)}</span>`).join("")
      : '<span style="color:var(--ink-2);font-size:13px">暂无</span>';

    $("pTagsSection").style.display = "";
    $("pViewsSection").style.display = "";
    $("pKwSection").style.display = tags.length || kws.length ? "" : "none";
  } catch {
    $("pTagsSection").style.display = "none";
    $("pViewsSection").style.display = "none";
    $("pKwSection").style.display = "none";
  }

  $("profileDialog").showModal();
}
$("pEditChar").addEventListener("click", () => {

  if (_profileCharId) editChar(_profileCharId);
});

  $("cId").value = c?.id || ""; $("cEmoji").value = c?.avatar_emoji || ""; $("cName").value = c?.name || "";

}
function editChar(id) { openCharDialog(characters.find((c) => c.id === id)); }
$("addCharBtn").addEventListener("click", () => openCharDialog(null));
$("cCancel").addEventListener("click", () => $("charDialog").close());
$("charForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  await api("/api/ownwe/characters/upsert", {
    id: $("cId").value || undefined, avatar_emoji: $("cEmoji").value || "🙂", name: $("cName").value.trim(),

$("cDelete").addEventListener("click", async () => {
  const id = $("cId").value;

// ── Moments ───────────────────────────────────────────────────────────────
let openMoreMenu = null;
async function loadMoments() {
  const list = await api("/api/ownwe/moments");
  const blocked = await api("/api/ownwe/moments/blocked").then((r) => new Set(r.blocked || [])).catch(() => new Set());
  blockedCharIds = blocked;
  const box = $("momentsList");
  if (!list.length) { box.innerHTML = '<div class="empty">还没有朋友圈。发布第一条吧。</div>'; return; }
  box.innerHTML = list.map((m) => renderMoment(m)).join("");
  attachMomentHandlers(box);
}

function renderMoment(m) {
  const isMe = m.author_type === "user";
  const moreBtn = !isMe ? `
    <div class="more-btn" style="position:relative">
      <button data-more="${m.id}" data-charid="${m.author_id || ""}">···</button>
    </div>` : "";
  const likeNames = (m.likeNames || []);
  return `
    <div class="moment" data-mid="${m.id}">
      <div class="avatar">${m.authorEmoji}</div>
      <div class="body">
        <div class="name">${esc(m.authorName)}</div>
        <div class="text">${esc(m.text)}</div>
        <div class="meta">
          <span>${fmtTime(m.created_at)}</span>
          <button data-like="${m.id}">${(m.likes || []).includes("self") ? "❤️ 已赞" : "🤍 赞"}</button>
          <button data-cmt="${m.id}">💬 评论</button>
          ${moreBtn}
        </div>
        ${likeNames.length ? `<div class="likes">❤️ ${likeNames.map(esc).join("、")}</div>` : ""}
        ${(m.comments || []).length ? `<div class="comments">${renderComments(m.comments)}</div>` : ""}
        <div class="comment-add" data-add="${m.id}" style="display:none">
          <input id="cmtInput-${m.id}" placeholder="说点什么…">
          <button class="btn" data-send="${m.id}">发送</button>
        </div>
      </div>
    </div>`;
}

function renderComments(comments) {
  return comments.map((c) => {
    const replyPart = c.replyToName ? `<span class="reply-who">回复 ${esc(c.replyToName)}：</span>` : "";
    return `<div class="comment" data-cmtid="${c.id}" data-cmtname="${esc(c.authorName)}">
      <div class="comment-body"><span class="who">${esc(c.authorName)}：</span>${replyPart}${esc(c.text)}</div>
      <button class="comment-reply-btn" data-reply="${c.id}">回复</button>
    </div>`;
  }).join("");
}

function attachMomentHandlers(box) {
  box.querySelectorAll("[data-like]").forEach((b) => b.addEventListener("click", async () => {
    await api("/api/ownwe/moments/like", { momentId: Number(b.dataset.like) }); loadMoments();
  }));
  box.querySelectorAll("[data-cmt]").forEach((b) => b.addEventListener("click", () => {
    const add = box.querySelector(`[data-add="${b.dataset.cmt}"]`);
    const inp = $(`cmtInput-${b.dataset.cmt}`);
    if (add) {
      const showing = add.style.display !== "none";
      add.style.display = showing ? "none" : "flex";
      if (!showing && inp) { inp.dataset.replyToId = ""; inp.dataset.replyToName = ""; inp.placeholder = "说点什么…"; inp.focus(); }
    }
  }));
  box.querySelectorAll("[data-send]").forEach((b) => b.addEventListener("click", async () => {
    const mid = b.dataset.send;
    const inp = $(`cmtInput-${mid}`);
    const text = inp?.value.trim();
    if (!text) return;
    const replyToId = inp.dataset.replyToId ? Number(inp.dataset.replyToId) : 0;
    const replyToName = inp.dataset.replyToName || "";
    await api("/api/ownwe/moments/comment", { momentId: Number(mid), text, replyToId, replyToName });
    loadMoments();
  }));
  box.querySelectorAll("[data-reply]").forEach((b) => b.addEventListener("click", () => {
    const cmtEl = b.closest(".comment");
    const mid = cmtEl?.closest(".moment")?.dataset.mid;
    if (!mid) return;
    const authorName = cmtEl.dataset.cmtname || "";
    const cmtId = b.dataset.reply;
    const add = box.querySelector(`[data-add="${mid}"]`);
    const inp = $(`cmtInput-${mid}`);
    if (add && inp) {
      add.style.display = "flex";
      inp.dataset.replyToId = cmtId;
      inp.dataset.replyToName = authorName;
      inp.placeholder = `回复 ${authorName}…`;
      inp.focus();
    }
  }));
  box.querySelectorAll("[data-more]").forEach((b) => b.addEventListener("click", (e) => {
    e.stopPropagation();
    if (openMoreMenu) { openMoreMenu.remove(); openMoreMenu = null; }
    const charId = b.dataset.charid;
    const isBlocked = blockedCharIds.has(charId);
    const menu = document.createElement("div");
    menu.className = "more-menu";
    menu.innerHTML = `
      <button data-block="${charId}">${isBlocked ? "✅ 已屏蔽，点击取消" : "🚫 不看TA的朋友圈"}</button>`;
    b.parentElement.appendChild(menu);
    openMoreMenu = menu;
    menu.querySelector("[data-block]").addEventListener("click", async () => {
      await api("/api/ownwe/moments/block", { charId });
      menu.remove(); openMoreMenu = null;
      loadMoments();
    });
  }));
}

document.addEventListener("click", () => {
  if (openMoreMenu) { openMoreMenu.remove(); openMoreMenu = null; }
});

$("momentPost").addEventListener("click", async () => {
  const text = $("momentInput").value.trim();
  if (!text) return;
  $("momentPost").disabled = true;
  await api("/api/ownwe/moments/post", { text });
  $("momentInput").value = "";
  loadMoments();
  setTimeout(loadMoments, 4000);
  setTimeout(() => { loadMoments(); $("momentPost").disabled = false; }, 9000);
});

$("charPostBtn").addEventListener("click", async () => {
  $("charPostBtn").disabled = true;
  $("charPostBtn").textContent = "生成中…";
  await api("/api/ownwe/moments/char-post", { force: true });
  setTimeout(() => { loadMoments(); $("charPostBtn").disabled = false; $("charPostBtn").textContent = "角色发圈"; }, 3000);
});

function fmtTime(iso) {
  const d = new Date((iso || "").replace(" ", "T") + (iso && iso.includes("Z") ? "" : "Z"));
  if (isNaN(d)) return iso || "";
  return d.toLocaleString("zh-CN", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

// ── Settings (user base) ──────────────────────────────────────────────────
async function loadUserBase() {
  const b = await fetch("/api/ownwe/user-base").then((r) => r.json());
  $("pAge").value = b.age || ""; $("pGender").value = b.gender || ""; $("pMbti").value = b.mbti || "";
  $("pCity").value = b.city || ""; $("pMajor").value = b.major || ""; $("pGrade").value = b.grade || "";
  $("pIndustries").value = (b.industries || []).join(", ");
}
$("pSave").addEventListener("click", async () => {
  await api("/api/ownwe/user-base/save", {
    age: $("pAge").value.trim(), gender: $("pGender").value.trim(), mbti: $("pMbti").value.trim(),
    city: $("pCity").value.trim(), major: $("pMajor").value.trim(), grade: $("pGrade").value.trim(),
    industries: $("pIndustries").value.split(/[,，]/).map((s) => s.trim()).filter(Boolean),
  });
  const s = $("pSaved"); s.style.display = "inline"; setTimeout(() => { s.style.display = "none"; }, 1500);
});

// ── Unread (proactive check-ins) ─────────────────────────────────────────
async function refreshUnread() {
  try {
    const next = await fetch("/api/ownwe/unread").then((r) => r.json());
    const changed = JSON.stringify(next) !== JSON.stringify(unread);
    unread = next || {};
    if (changed && (currentTab === "chats" || currentTab === "contacts")) loadContacts();
    const any = Object.keys(unread).length > 0;
    let dot = document.querySelector('.rail-btn[data-tab="chats"] .rail-dot');
    const btn = document.querySelector('.rail-btn[data-tab="chats"]');
    if (any && !dot && btn) { dot = document.createElement("div"); dot.className = "rail-dot"; btn.appendChild(dot); }
    if (!any && dot) dot.remove();
  } catch {}
}
setInterval(refreshUnread, 20000);

loadContacts();
refreshUnread();
</script>
</body>
</html>
